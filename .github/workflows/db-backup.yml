name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          set -o pipefail 
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          ls -lh "$FILENAME"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload to Google Drive
        run: rclone copy "$FILENAME" gdrive:RentACarBackups/

      - name: Delete backups older than 30 days
        run: rclone delete gdrive:RentACarBackups/ --min-age 30d

      - name: Cleanup
        if: always()
        run: rm -f "$FILENAME"
