name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/58988569747/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'rantacarbackups@fleet-hub-calendar-sync-id.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Upload to Google Drive
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          RCLONE_TOKEN="{\"access_token\":\"${ACCESS_TOKEN}\",\"token_type\":\"Bearer\",\"expiry\":\"2099-01-01T00:00:00Z\"}"
          RCLONE_CONFIG_GDRIVE_TYPE=drive \
          RCLONE_CONFIG_GDRIVE_SCOPE=drive \
          RCLONE_CONFIG_GDRIVE_TOKEN="${RCLONE_TOKEN}" \
          RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID="${GDRIVE_FOLDER_ID}" \
          rclone copy ${{ env.FILENAME }} gdrive:

      - name: Delete backups older than 30 days
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          RCLONE_TOKEN="{\"access_token\":\"${ACCESS_TOKEN}\",\"token_type\":\"Bearer\",\"expiry\":\"2099-01-01T00:00:00Z\"}"
          RCLONE_CONFIG_GDRIVE_TYPE=drive \
          RCLONE_CONFIG_GDRIVE_SCOPE=drive \
          RCLONE_CONFIG_GDRIVE_TOKEN="${RCLONE_TOKEN}" \
          RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID="${GDRIVE_FOLDER_ID}" \
          rclone delete gdrive: --min-age 30d

      - name: Cleanup
        if: always()
        run: rm -f ${{ env.FILENAME }}
