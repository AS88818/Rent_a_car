name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC every day
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          FILENAME="backup_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Setup Google Drive credentials
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

      - name: Upload to Google Drive
        run: rclone copy "${{ env.FILENAME }}" gdrive:

      - name: Delete backups older than 30 days
        run: rclone delete gdrive: --min-age 30d

      - name: Cleanup local files
        if: always()
        run: |
          rm -f "${{ env.FILENAME }}"
          rm -f /tmp/sa.json
