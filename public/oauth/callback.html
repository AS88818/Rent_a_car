<!DOCTYPE html>
<html>
<head>
  <title>Connecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f3f4f6;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.25rem; color: #111827; margin-bottom: 0.5rem; }
    p { color: #6b7280; margin: 0; }
    .error { color: #dc2626; }
    .success { color: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Connecting...</h1>
    <p id="message">Please wait...</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var error = params.get('error');
      var state = params.get('state') || 'calendar';

      var isGmail = state === 'gmail';
      var MSG_TYPE  = isGmail ? 'gmail-oauth-callback'  : 'google-oauth-callback';
      var DONE_TYPE = isGmail ? 'gmail-oauth-complete'  : 'google-oauth-complete';

      var spinner = document.getElementById('spinner');
      var title   = document.getElementById('title');
      var msg     = document.getElementById('message');

      title.textContent = isGmail ? 'Connecting Gmail' : 'Connecting Google Calendar';

      function showError(text) {
        spinner.style.display = 'none';
        title.textContent = 'Connection Failed';
        title.className = 'error';
        msg.textContent = text;
        msg.className = 'error';
      }

      function showSuccess() {
        spinner.style.display = 'none';
        title.textContent = 'Connected!';
        title.className = 'success';
        msg.textContent = 'This window will close shortly...';
      }

      function sendToParent(payload) {
        // Try BroadcastChannel first — works when window.opener is null
        // (e.g. Bolt.new sandbox uses allow-popups-to-escape-sandbox)
        try {
          var bc = new BroadcastChannel('google-oauth-channel');
          bc.postMessage(payload);
          bc.close();
        } catch(e) {}

        // Also try window.opener for direct (non-sandboxed) access
        if (window.opener) {
          try {
            window.opener.postMessage(payload, '*');
          } catch(e) {}
        }
      }

      if (error) {
        var errorMsg = error === 'access_denied'
          ? 'You denied access. Please try again.'
          : 'Google OAuth error: ' + error;
        showError(errorMsg);
        sendToParent({ type: MSG_TYPE, success: false, error: errorMsg });
        setTimeout(function () { window.close(); }, 3000);
        return;
      }

      if (!code) {
        showError('No authorisation code received.');
        return;
      }

      msg.textContent = 'Completing connection...';
      sendToParent({ type: MSG_TYPE, success: true, code: code });

      // Listen for completion signal from parent
      var doneChannel = new BroadcastChannel('google-oauth-channel');
      doneChannel.onmessage = function(event) {
        if (event.data && event.data.type === DONE_TYPE) {
          doneChannel.close();
          if (event.data.success) {
            showSuccess();
          } else {
            showError(event.data.error || 'Failed to connect');
          }
          setTimeout(function() { window.close(); }, 1500);
        }
      };

      // Also listen via window.message for non-BroadcastChannel path
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === DONE_TYPE) {
          doneChannel.close();
          if (event.data.success) {
            showSuccess();
          } else {
            showError(event.data.error || 'Failed to connect');
          }
          setTimeout(function() { window.close(); }, 1500);
        }
      });

      // Safety timeout — close anyway after 10s so popup never hangs
      setTimeout(function () {
        doneChannel.close();
        showSuccess();
        setTimeout(function () { window.close(); }, 1500);
      }, 10000);
    })();
  </script>
</body>
</html>
